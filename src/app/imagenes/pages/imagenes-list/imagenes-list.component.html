<div class="container mt-4">
  <div class="imagenes-topbar">
    <h2 class="mb-4">Imágenes Aleatorias</h2>
    <button class="btn-icon" (click)="toggleFavoritosPanel()" aria-label="Mostrar favoritos">
      ❤️ Favoritos ({{ favoritos.length }})
    </button>
  </div>

  <div class="error-box" *ngIf="errorMessage">
    <div class="error-header">
      <span>⚠️ <strong>Error</strong></span>
      <button class="error-close" (click)="cerrarError()">✕</button>
    </div>
    <pre class="error-body">{{ errorMessage }}</pre>
  </div>

  <div class="favoritos-panel" *ngIf="showFavoritosPanel">
    <h3>Favoritas</h3>

    <div class="favoritos-grid" *ngIf="favoritos.length > 0; else sinFavoritos">
      <div
        class="favorito-card"
        *ngFor="let favorito of favoritos"
        [class.selected]="favorito.id === selectedFavoritoId"
        (click)="seleccionarFavorito(favorito.id)"
      >
        <img [src]="favorito.image.url" [alt]="'Favorito ' + favorito.image_id" loading="lazy" />
        <div class="favorito-meta">
          <span>ID: {{ favorito.id }}</span>
          <button class="btn-select" type="button">
            {{ favorito.id === selectedFavoritoId ? 'Seleccionado' : 'Seleccionar y copiar ID' }}
          </button>
        </div>
      </div>
    </div>
    <ng-template #sinFavoritos>
      <p>No hay imágenes guardadas como favoritas.</p>
    </ng-template>
  </div>

  <div class="imagenes-grid">
    <div class="imagen-card" *ngFor="let imagen of paginatedImagenesList">
      <img [src]="imagen.url" [alt]="'Gato ' + imagen.id" class="imagen-gato" loading="lazy" />
      <a class="imagen-url" [href]="imagen.url" target="_blank" rel="noopener noreferrer">
        {{ imagen.url }}
      </a>
      <button class="btn-favorito" (click)="addFavorito(imagen.id)">♥ Agregar a favorito</button>
    </div>
  </div>

  <div class="pagination-controls text-center" *ngIf="totalPagesCount > 1">
    <button
      class="btn btn-secondary"
      type="button"
      [disabled]="currentPage === 1"
      (click)="prevPage()"
    >
      « Anterior
    </button>
    <span>Página {{ currentPage }} de {{ totalPagesCount }}</span>
    <button
      class="btn btn-secondary"
      type="button"
      [disabled]="currentPage === totalPagesCount"
      (click)="nextPage()"
    >
      Siguiente »
    </button>
  </div>

  <div class="text-center mt-3">
    <button class="btn btn-primary" (click)="recargarImagenes()">🔄 Cargar nuevas imágenes</button>
  </div>
</div>
